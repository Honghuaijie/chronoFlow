server:
  http:
    network: tcp
    addr: 0.0.0.0:10003
    timeout: 30s
  grpc:
    network: tcp
    addr: 0.0.0.0:11003
    timeout: 30s
  public_base_url: "${PUBLIC_BASE_URL:http://127.0.0.1:10003}"

data:
  database:
    driver: mysql
    host: "${DB_HOST:127.0.0.1}"
    port: "${DB_PORT:3306}"
    username: "${DB_USER:root}"
    password: "${DB_PASSWORD:root}"
    database: "${DB_NAME:chronoflow}"
    charset: utf8mb4
    parseTime: true
    loc: Local
  redis:
    network: tcp
    addr: "${REDIS_ADDR:127.0.0.1:6379}"
    read_timeout: 0.2s
    write_timeout: 0.2s

logging:
  level: INFO
  file:
    path: ./
    name: "chronoFlow-admin.log"
    maxSize: 10
    maxBackups: 5
    maxAge: 30
    compress: false

scheduler:
  timezone: "${SCHEDULER_TIMEZONE:Asia/Shanghai}"

executor:
  health_check_interval_seconds: 10
  health_check_fail_threshold: 3
  request_timeout_seconds: 10

security:
  jwt_secret: "${JWT_SECRET:change-me}"
  token_encrypt_key: "${CHRONOFLOW_TOKEN_ENCRYPT_KEY:12345678901234567890123456789012}"
  callback_token: "${CHRONOFLOW_CALLBACK_TOKEN:change-me-callback-token}"
  admin_username: "${CHRONOFLOW_ADMIN_USERNAME:admin}"
  admin_password: "${CHRONOFLOW_ADMIN_PASSWORD:admin123}"

logs:
  data_dir: "${CHRONOFLOW_LOG_DATA_DIR:./data}"
  max_log_bytes: 5242880
  retention_days: 30
  cleanup_cron: "0 0 3 * * *"

recovery:
  startup_running_grace_seconds: 120
  killing_timeout_seconds: 60
