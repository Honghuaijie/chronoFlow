name: Build Backend Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chronoFlow-admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch,suffix=-{{sha}}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show image tags
        run: |
          echo "Published image tags:"
          printf '%s\n' "${{ steps.meta.outputs.tags }}"

          {
            echo "## Published Images"
            echo
            echo "可以直接复制下面任一镜像名："
            echo
            printf '%s\n' "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              echo "- \`$tag\`"
            done
            echo
            echo "## Deploy Commands"
            echo
            echo "在服务器的 \`project-dev/prod\` 目录可直接执行："
            echo
            printf '%s\n' "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              echo "- \`./desplay.sh $tag\`"
            done
            echo
            echo "Image digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
