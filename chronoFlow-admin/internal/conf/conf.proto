syntax = "proto3";

package kratos.api;

option go_package = "chronoFlow-admin/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Logging logging = 3;
  Scheduler scheduler = 4;
  Executor executor = 5;
  Security security = 6;
  Logs logs = 7;
  Recovery recovery = 8;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
  string public_base_url = 3;
}

message Data {
  message Database {
    string driver = 1;
    string host = 2;
    string port = 3;
    string username = 4;
    string password = 5;
    string database = 6;
    string charset = 7;
    bool parseTime = 8;
    string loc = 9;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}

message Logging {
  string level = 1;
  File file = 2;
  message File {
    string path = 1;
    string name = 2;
    int32 maxSize = 3;
    int32 maxBackups = 4;
    int32 maxAge = 5;
    bool compress = 6;
  }
}

message Scheduler {
  string timezone = 1;
}

message Executor {
  int32 health_check_interval_seconds = 1;
  int32 health_check_fail_threshold = 2;
  int32 request_timeout_seconds = 3;
}

message Security {
  string jwt_secret = 1;
  string token_encrypt_key = 2;
  string callback_token = 3;
  string admin_username = 4;
  string admin_password = 5;
}

message Logs {
  string data_dir = 1;
  int64 max_log_bytes = 2;
  int32 retention_days = 3;
  string cleanup_cron = 4;
}

message Recovery {
  int32 startup_running_grace_seconds = 1;
  int32 killing_timeout_seconds = 2;
}
