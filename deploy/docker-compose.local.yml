name: chronoflow-local

services:
  admin:
    build:
      context: ../chronoFlow-admin
    image: chronoflow-admin:local
    container_name: chronoflow-admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: chronoflow
      PUBLIC_BASE_URL: http://chronoflow-admin:10003
      JWT_SECRET: local-dev-jwt-secret
      CHRONOFLOW_TOKEN_ENCRYPT_KEY: "12345678901234567890123456789012"
      CHRONOFLOW_CALLBACK_TOKEN: local-callback-token
      CHRONOFLOW_ADMIN_USERNAME: admin
      CHRONOFLOW_ADMIN_PASSWORD: admin123
      CHRONOFLOW_LOG_DATA_DIR: /app/data
      SCHEDULER_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai
    ports:
      - "10003:10003"
      - "11003:11003"
    volumes:
      - ./local/admin-conf:/data/conf:ro
      - ./local/admin-data:/app/data
      - ./local/admin-logs:/logs

  exec:
    build:
      context: ../chronoFlow-exec
    image: chronoflow-exec:local
    container_name: chronoflow-exec
    environment:
      EXECUTOR_NAME: local-docker-exec
      EXECUTOR_TOKEN: local-exec-token
      EXECUTOR_DATA_DIR: /app/data
      EXECUTOR_TEMP_DIR: /app/data/tmp
      EXECUTOR_SHELL_PATH: /bin/bash
      TZ: Asia/Shanghai
    ports:
      - "10004:10004"
      - "11004:11004"
    volumes:
      - ./local/exec-conf:/data/conf:ro
      - ./local/exec-data:/app/data
      - ./local/exec-logs:/logs
      - ./local/scripts:/scripts:ro
