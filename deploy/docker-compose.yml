name: chronoflow

services:
  admin:
    build:
      context: ../chronoFlow-admin
    image: chronoflow-admin:local
    container_name: chronoflow-admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-chronoflow}
      DB_PASSWORD: ${DB_PASSWORD:-chronoflow123}
      DB_NAME: ${DB_NAME:-chronoflow}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://chronoflow-admin:10003}
      CHRONOFLOW_ADMIN_HTTP_PORT: ${CHRONOFLOW_ADMIN_HTTP_PORT:-10003}
      CHRONOFLOW_ADMIN_GRPC_PORT: ${CHRONOFLOW_ADMIN_GRPC_PORT:-11003}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      CHRONOFLOW_TOKEN_ENCRYPT_KEY: ${CHRONOFLOW_TOKEN_ENCRYPT_KEY:-12345678901234567890123456789012}
      CHRONOFLOW_CALLBACK_TOKEN: ${CHRONOFLOW_CALLBACK_TOKEN:-change-this-callback-token}
      CHRONOFLOW_ADMIN_USERNAME: ${CHRONOFLOW_ADMIN_USERNAME:-admin}
      CHRONOFLOW_ADMIN_PASSWORD: ${CHRONOFLOW_ADMIN_PASSWORD:-admin123}
      CHRONOFLOW_LOG_DATA_DIR: ${CHRONOFLOW_LOG_DATA_DIR:-/app/data}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Shanghai}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${CHRONOFLOW_ADMIN_HTTP_PORT:-10003}:${CHRONOFLOW_ADMIN_HTTP_PORT:-10003}"
      - "${CHRONOFLOW_ADMIN_GRPC_PORT:-11003}:${CHRONOFLOW_ADMIN_GRPC_PORT:-11003}"
    volumes:
      - chronoflow-admin-data:/app/data
      - chronoflow-admin-logs:/logs
    restart: unless-stopped
    networks:
      - chronoflow

  exec:
    build:
      context: ../chronoFlow-exec
    image: chronoflow-exec:local
    container_name: chronoflow-exec
    environment:
      CHRONOFLOW_EXEC_HTTP_PORT: ${CHRONOFLOW_EXEC_HTTP_PORT:-10004}
      CHRONOFLOW_EXEC_GRPC_PORT: ${CHRONOFLOW_EXEC_GRPC_PORT:-11004}
      EXECUTOR_NAME: ${EXECUTOR_NAME:-default-exec}
      EXECUTOR_TOKEN: ${EXECUTOR_TOKEN:-default-exec-token}
      EXECUTOR_DATA_DIR: ${EXECUTOR_DATA_DIR:-/app/data}
      EXECUTOR_TEMP_DIR: ${EXECUTOR_TEMP_DIR:-/app/data/tmp}
      EXECUTOR_SHELL_PATH: ${EXECUTOR_SHELL_PATH:-/bin/bash}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${CHRONOFLOW_EXEC_HTTP_PORT:-10004}:${CHRONOFLOW_EXEC_HTTP_PORT:-10004}"
      - "${CHRONOFLOW_EXEC_GRPC_PORT:-11004}:${CHRONOFLOW_EXEC_GRPC_PORT:-11004}"
    volumes:
      - chronoflow-exec-data:/app/data
      - chronoflow-exec-logs:/logs
      - ./scripts:/scripts:ro
    restart: unless-stopped
    networks:
      - chronoflow

  ui:
    build:
      context: ../chronoFlow-ui
    image: chronoflow-ui:local
    container_name: chronoflow-ui
    environment:
      CHRONOFLOW_ADMIN_UPSTREAM: ${CHRONOFLOW_ADMIN_UPSTREAM:-http://chronoflow-admin:10003}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${CHRONOFLOW_UI_PORT:-5173}:80"
    depends_on:
      - admin
    restart: unless-stopped
    networks:
      - chronoflow

volumes:
  chronoflow-admin-data:
  chronoflow-admin-logs:
  chronoflow-exec-data:
  chronoflow-exec-logs:

networks:
  chronoflow:
    name: chronoflow
