syntax = "proto3";

package kratos.api;

option go_package = "chronoFlow-exec/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Logging logging = 3;
  Executor executor = 4;
  Callback callback = 5;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Logging {
  string level = 1;
  File file = 2;
  message File {
    string path = 1;
    string name = 2;
    int32 maxSize = 3;
    int32 maxBackups = 4;
    int32 maxAge = 5;
    bool compress = 6;
  }
}

message Executor {
  string name = 1;
  string token = 2;
  string data_dir = 3;
  string shell_path = 4;
  string temp_dir = 5;
  int32 kill_grace_seconds = 6;
  int64 max_log_bytes = 7;
}

message Callback {
  int32 retry_interval_seconds = 1;
  int32 pending_retention_days = 2;
  int32 request_timeout_seconds = 3;
}
