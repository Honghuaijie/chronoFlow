server:
  http:
    network: tcp
    addr: 0.0.0.0:10004
    timeout: 30s
  grpc:
    network: tcp
    addr: 0.0.0.0:11004
    timeout: 30s

executor:
  name: "${EXECUTOR_NAME:executor-01}"
  token: "${EXECUTOR_TOKEN:change-me}"
  data_dir: "${EXECUTOR_DATA_DIR:./data}"
  shell_path: "${EXECUTOR_SHELL_PATH:/bin/bash}"
  temp_dir: "${EXECUTOR_TEMP_DIR:./data/tmp}"
  kill_grace_seconds: 5
  max_log_bytes: 5242880

callback:
  retry_interval_seconds: 30
  pending_retention_days: 7
  request_timeout_seconds: 10

logging:
  level: INFO
  file:
    path: ./
    name: "chronoFlow-exec.log"
    maxSize: 10
    maxBackups: 5
    maxAge: 30
    compress: false
